<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion | Legacy Navigation Hub</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars-bg"></div>
    <header class="hub-header">
        <h1>Orion</h1>
        <p>Locate yourself. Choose your Gate.</p>
    </header>

    <main class="core-map">
        <div class="wheel-container" id="wheel-container">
            <button id="btn-quiz" class="center-node">Where Are You?</button>
        </div>

        <aside class="info-panel hidden" id="info-panel">
            <h2 id="gate-title">Gate Name</h2>
            <p id="gate-desc">Gate description...</p>
            <button class="action-btn">Enter Gate</button>
        </aside>
    </main>

    <script src="./app.js"></script>
</body>
</html>
